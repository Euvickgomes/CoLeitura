<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login – CoLeitor</title>
    <link rel="stylesheet" href="../estilos/style.css" />
    <link rel="stylesheet" href="../estilos/login.css" />
  </head>
  <body>
    <div class="login-container">
      <div class="login-box">
        <img
          src="../imagens/sing_icon.jpg"
          alt="Ícone de Login"
          class="login-icon"
        />
        <h2>Entrar</h2>

        <!-- FORMULÁRIO DE LOGIN -->
        <form id="loginForm">
          <input
            type="text"
            id="loginInput"
            placeholder="Email ou Nome de Usuário"
            required
          />
          <input
            type="password"
            id="passwordInput"
            placeholder="Senha"
            required
          />
          <button type="submit" class="btn">Entrar</button>
          <p id="loginError" class="error-msg"></p>
        </form>

        <hr />

        <!-- FORMULÁRIO DE CADASTRO -->
        <h3>Ou cadastre-se</h3>
        <form id="registerForm">
          <input
            type="text"
            id="registerUsername"
            placeholder="Nome de Usuário"
            required
          />
          <input type="email" id="registerEmail" placeholder="Email" required />
          <input
            type="password"
            id="registerPassword"
            placeholder="Senha"
            required
          />
          <button type="submit" class="btn">Cadastrar</button>
          <p id="registerSuccess" class="success-msg"></p>
        </form>
      </div>
    </div>

    <!-- 1) Cria usuário de teste (executa apenas uma vez) -->
    <script src="../js/usuarios.js"></script>

    <!-- 2) Lida com login, cadastro e redirecionamento -->
    <script src="../js/login.js"></script>
  </body>
</html>
